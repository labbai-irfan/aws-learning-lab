# Frontend Nginx: serve the React SPA + (for LOCAL compose) proxy /api/* to services.
# On ECS the ALB does the /api/* path routing, so those proxy blocks are simply never hit
# there — the ALB sends only "/" traffic to this frontend service.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Docker's embedded DNS — lets proxy_pass use a variable so Nginx does NOT
    # fail to start if a service name isn't resolvable yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/auth/ {
        set $u http://auth:5000/;
        proxy_pass $u;
        proxy_set_header Host $host;
    }
    location /api/emp/ {
        set $u http://employee:5000/;
        proxy_pass $u;
        proxy_set_header Host $host;
    }
    location /api/pay/ {
        set $u http://payroll:5000/;
        proxy_pass $u;
        proxy_set_header Host $host;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
