name: Repo Guard

# Enforces repository integrity on every push/PR:
#  - no duplicate NN- phase-folder numbers
#  - no broken relative markdown links
# See STANDARDS.md §6.5 / §7.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check links + phase numbering
        run: node .github/scripts/check-repo.mjs
